# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:

name: lint.yaml

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        # LINTR_ERROR_ON_LINT intentionally not set — lint findings are
        # advisory only on this 2020-era codebase. The `.lintr` config at
        # repo root silences the categories that conflict with the
        # established style (PascalCase R6 names, 4-space indents,
        # explicit return(), etc.). Stylistic modernization is tracked
        # separately and is not a precondition for CRAN release.
