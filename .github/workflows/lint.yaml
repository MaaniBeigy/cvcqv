# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:

name: lint.yaml

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, any::pkgload, local::.
          needs: lint

      - name: Lint
        # `pkgload::load_all()` first so that lintr's `object_usage_linter`
        # can resolve cross-file internal helpers (e.g. R/aak_helpers.R)
        # via the package's in-memory namespace. Without this, lintr only
        # sees the installed (NAMESPACE-exported) symbols and flags every
        # internal function call as `no visible global function`.
        run: |
          pkgload::load_all(".", quiet = TRUE)
          lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
